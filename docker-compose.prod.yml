services:
  app:
    # Run the image pre-built from github
    # This should be marked as public within the github packages configuration
    # or credentials provided to access
    image: ghcr.io/supportingami/trinket-oss/app:latest
    ports:
      - 3000:3000
    container_name: trinket
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - trinket
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trinket

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    command: mongod --quiet
    volumes:
      - mongodb_prod_data:/data/db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trinket

networks:
  trinket:
    driver: bridge

volumes:
  mongodb_prod_data:
