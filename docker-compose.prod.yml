services:
  app:
    # Run the image pre-built from github
    # This should be marked as public within the github packages configuration
    # or credentials provided to access
    image: ghcr.io/supportingami/trinket-oss/app:latest
    ports:
      - 3000:3000
    container_name: trinket
    environment:
      - NODE_ENV=production
      - SESSION_COOKIE_PASSWORD=${SESSION_COOKIE_PASSWORD}
      - APP_URL_PROTOCOL=${APP_URL_PROTOCOL:-http}
      - APP_URL_HOSTNAME=${APP_URL_HOSTNAME:-localhost}
      - APP_URL_PORT=${APP_URL_PORT:-3000}
      - APP_SESSION_IS_SECURE=${APP_SESSION_IS_SECURE:-false}
      - MONGO_HOST=${MONGO_HOST:-mongodb}
      - MONGO_PORT=${MONGO_PORT:-27017}
      - MONGO_DATABASE=${MONGO_DATABASE:-trinket}
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASS=${MONGO_PASS}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASS=${REDIS_PASS}
      - REDIS_DB=${REDIS_DB:-0}
      - AWS_CDN_HOST=${AWS_CDN_HOST}
      - APP_EMBED_SKULPT_LOCAL=${APP_EMBED_SKULPT_LOCAL:-true}
      - APP_EMBED_SKULPT_MIN=${APP_EMBED_SKULPT_MIN:-true}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - MAIL_FROM=${MAIL_FROM}

    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - trinket
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trinket

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    command: mongod --quiet
    volumes:
      - mongodb_prod_data:/data/db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trinket

networks:
  trinket:
    driver: bridge

volumes:
  mongodb_prod_data:
