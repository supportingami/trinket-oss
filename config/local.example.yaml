# Trinket Local Configuration
# Copy this file to local.yaml: cp config/local.example.yaml config/local.yaml
# IMPORTANT: Never commit local.yaml to version control

# =============================================================================
# REQUIRED
# =============================================================================

app:
  url:
    protocol: http
    hostname: localhost
    port: 3000

  plugins:
    session:
      cookieOptions:
        # CHANGE THIS - must be at least 32 characters
        password: 'change-this-to-a-secure-password-min-32-chars!'
        domain: ''
        isSecure: false  # Set true in production with HTTPS

  embed:
    skulpt:
      local: true
      min: true

# =============================================================================
# DATABASE
# =============================================================================

db:
  mongo:
    host: mongodb      # Use 'mongodb' for Docker, 'localhost' for local
    port: 27017
    database: trinket

  # Redis is OPTIONAL - sessions work without it
  redis:
    enabled: false

# =============================================================================
# OPTIONAL: Email (for password reset)
# =============================================================================
# Without email, users can still register and log in, but password reset won't work.

  mail:
    from: ''
    host: ''
    port: 587
    user: ''
    pass: ''

# =============================================================================
# OPTIONAL: File Storage (for asset uploads in trinkets)
