services:
  app:
    build: .
    image: trinket/app:latest
    ports:
      - 3000:3000
    container_name: trinket
    volumes:
      - .:/usr/local/node/trinket
      - node_modules:/usr/local/node/trinket/node_modules
      - public_components:/usr/local/node/trinket/public/components
    networks:
      - trinket
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    command: bash -c "node scripts/generate-config.js && npm run build:css && pm2-docker start app.js"
    environment:
      - NODE_ENV=development
      - SESSION_COOKIE_PASSWORD=${SESSION_COOKIE_PASSWORD}
      - APP_URL_PROTOCOL=${APP_URL_PROTOCOL:-http}
      - APP_URL_HOSTNAME=${APP_URL_HOSTNAME:-localhost}
      - APP_URL_PORT=${APP_URL_PORT:-3000}
      - APP_SESSION_IS_SECURE=${APP_SESSION_IS_SECURE:-false}
      - MONGO_HOST=${MONGO_HOST:-mongodb}
      - MONGO_PORT=${MONGO_PORT:-27017}
      - MONGO_DATABASE=${MONGO_DATABASE:-trinket}
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASS=${MONGO_PASS}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASS=${REDIS_PASS}
  redis:
    image: redis:alpine
    ports:
      - 16379:6379
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trinket
  mongodb:
    image: mongo:7.0
    ports:
      - 17017:27017
    container_name: mongodb
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trinket
networks:
  trinket:
    driver: bridge
volumes:
  shared-cache:
  node_modules:
  public_components:
  mongodb_data:
